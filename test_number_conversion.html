<!DOCTYPE html>
<html>
<head>
    <title>Number Conversion Rule Test</title>
    <script>
        // Load rules from rules.json
        const ruleData = {
            "find": "(?<![\\w./:;\\-–—\\[\\]%])\\b([0-9]|[1-9][0-9]|100)\\b(?![\\w./:;\\-–—\\[\\]%])",
            "replace": function(match) {
                const n = parseInt(match);
                if (n === 9 || n === 12) return match;
                const ones = ['zero','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
                const tens = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
                if (n === 100) return 'one hundred';
                if (n < 20) return ones[n];
                if (n % 10 === 0) return tens[n/10];
                return tens[Math.floor(n/10)] + '-' + ones[n%10];
            },
            "flags": "g"
        };

        function testRule(input, expected, reason) {
            const regex = new RegExp(ruleData.find, ruleData.flags);
            const result = input.replace(regex, ruleData.replace);
            const passed = result === expected;
            
            return {
                input,
                expected,
                actual: result,
                passed,
                reason
            };
        }

        function runTests() {
            const tests = [
                { input: "2 dogs", expected: "two dogs", reason: "Standalone, space boundaries" },
                { input: "(5)", expected: "(five)", reason: "Parentheses allowed" },
                { input: "100%", expected: "100%", reason: "% in boundary check" },
                { input: "100 ways", expected: "one hundred ways", reason: "Standalone 100" },
                { input: "9 lives", expected: "9 lives", reason: "Exception (9)" },
                { input: "the 12", expected: "the 12", reason: "Exception (12)" },
                { input: "l33t", expected: "l33t", reason: "Letter adjacency" },
                { input: "24/7", expected: "24/7", reason: "Slash adjacency" },
                { input: "3:00", expected: "3:00", reason: "Colon adjacency" },
                { input: "867-5309", expected: "867-5309", reason: "Hyphen adjacency" },
                { input: "[Verse 1]", expected: "[Verse 1]", reason: "Bracket adjacency" },
                { input: "fifty-two", expected: "fifty-two", reason: "Already text (no match)" },
                { input: "I got 7 feelings", expected: "I got seven feelings", reason: "Single digit with spaces" },
                { input: "20 bucks", expected: "twenty bucks", reason: "Round tens" },
                { input: "35 minutes", expected: "thirty-five minutes", reason: "Compound number" },
                { input: "99 problems", expected: "ninety-nine problems", reason: "High compound number" },
                { input: "0 tolerance", expected: "zero tolerance", reason: "Zero conversion" },
                { input: "10.5mm", expected: "10.5mm", reason: "Decimal with unit" },
                { input: "3—5", expected: "3—5", reason: "Em dash adjacency" },
                { input: "3–5", expected: "3–5", reason: "En dash adjacency" },
                { input: "5;", expected: "5;", reason: "Semicolon adjacency" },
                { input: ".45 caliber", expected: ".45 caliber", reason: "Decimal at start" },
                { input: "Chapter 8", expected: "Chapter 8", reason: "Not in 0-100 range or exception" }  // 8 should convert
            ];

            // Fix the last test - 8 is in range and not an exception
            tests[tests.length - 1].expected = "Chapter eight";
            tests[tests.length - 1].reason = "8 should convert (in range)";

            const results = tests.map(t => testRule(t.input, t.expected, t.reason));
            
            const output = document.getElementById('output');
            output.innerHTML = '<h2>Test Results</h2>';
            
            const passed = results.filter(r => r.passed).length;
            const total = results.length;
            
            output.innerHTML += `<p style="font-size: 18px; font-weight: bold;">${passed}/${total} tests passed</p>`;
            
            results.forEach((r, i) => {
                const color = r.passed ? 'green' : 'red';
                const icon = r.passed ? '✓' : '✗';
                output.innerHTML += `
                    <div style="margin: 10px 0; padding: 10px; border: 1px solid ${color}; border-radius: 4px;">
                        <div style="color: ${color}; font-weight: bold;">${icon} Test ${i + 1}: ${r.reason}</div>
                        <div style="margin-top: 5px;">
                            <div>Input: "${r.input}"</div>
                            <div>Expected: "${r.expected}"</div>
                            <div>Actual: "${r.actual}"</div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</head>
<body onload="runTests()">
    <h1>Number Conversion Rule Test</h1>
    <div id="output"></div>
</body>
</html>
